{% extends 'base.html' %}
{% block title %}VibeSpace — Login{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card bg-dark border-secondary">
            <div class="card-body p-4">
                <h3 class="text-center mb-4"><i class="bi bi-box-arrow-in-right"></i> Login</h3>
                <form method="POST" action="{{ url_for('login') }}">
                    <div class="mb-3">
                        <label class="form-label">Username</label>
                        <input type="text" name="username" class="form-control" required autofocus>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Password</label>
                        <input type="password" name="password" class="form-control" required>
                    </div>
                    <button type="submit" class="btn btn-info w-100 mt-2">Log In</button>
                </form>
                <p class="text-center text-secondary mt-3 mb-0">
                    Don't have an account?
                    <a href="{{ url_for('register') }}" class="text-info">Sign up</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
