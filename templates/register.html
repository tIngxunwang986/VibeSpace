{% extends 'base.html' %}
{% block title %}VibeSpace — Sign Up{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card bg-dark border-secondary">
            <div class="card-body p-4">
                <h3 class="text-center mb-4"><i class="bi bi-person-plus"></i> Sign Up</h3>
                <form method="POST" action="{{ url_for('register') }}">
                    <div class="mb-3">
                        <label class="form-label">Username</label>
                        <input type="text" name="username" class="form-control" required autofocus>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" name="email" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Password</label>
                        <input type="password" name="password" class="form-control"
                               minlength="6" required>
                        <div class="form-text">At least 6 characters.</div>
                    </div>
                    <button type="submit" class="btn btn-info w-100 mt-2">Create Account</button>
                </form>
                <p class="text-center text-secondary mt-3 mb-0">
                    Already have an account?
                    <a href="{{ url_for('login') }}" class="text-info">Log in</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
